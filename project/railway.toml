[build]
# Railway detects Dockerfile automatically; this makes it explicit
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations then start — matches the Dockerfile CMD
startCommand = "bunx prisma migrate deploy --schema=./infrastructure/database/prisma/schema.prisma && bun start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.variables]
# Railway injects RAILWAY_PUBLIC_DOMAIN automatically — used by IS_RAILWAY detection
# Set all remaining vars in Railway dashboard → Variables tab
NODE_ENV = "production"
APP_ENV = "production"
NEXT_PUBLIC_APP_ENV = "production"
