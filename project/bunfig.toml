# Bun configuration (see https://bun.sh/docs/runtime/bunfig)
# Test runner config: https://bun.sh/docs/test/configuration

[test]
# Load mocks and polyfills before tests
preload = ["./__tests__/setup/bun-preload.ts"]
# Only run tests in __tests__ (unit + integration)
root = "__tests__"
# Exclude E2E specs — they use Playwright's test runner, not Bun's
exclude = ["e2e/**"]
# Match Jest’s timeout
timeout = 10000
# Coverage (enable with: bun test --coverage)
# coverage = false  # set true to enable by default
coverageDir = "coverage"
coverageReporter = ["text", "lcov"]
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "**/node_modules/**",
  "**/.next/**",
  "**/*.d.ts",
  "**/shared/components/ui/**",
  "**/infrastructure/database/lib/generated/**",
  "**/__tests__/setup/**",
]
# Optional: uncomment to enforce thresholds once more files meet them (Bun may apply per-file).
# coverageThreshold = { lines = 0.80, functions = 0.70, statements = 0.80 }
