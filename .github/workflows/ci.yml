name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# Shared CI environment — dummy values satisfy envUtil required
# checks at module load time. Real secrets live in deployment.
# ─────────────────────────────────────────────────────────────
