version: 2

updates:
  # ─── npm / bun (project dependencies) ──────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/project"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Batch all Radix UI updates together
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Batch all testing library updates
      testing:
        patterns:
          - "@testing-library/*"
          - "@playwright/*"
          - "bun-types"
      # Batch all AWS SDK updates
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
    ignore:
      # Only auto-update patch versions for these critical packages
      # Major/minor require manual review
      - dependency-name: "next"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "firebase"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"

  # ─── Docker ──────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/project"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "automated"
